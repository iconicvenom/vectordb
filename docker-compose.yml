services:
  vectordb:
    build:
      context: ./vectordb
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      # Point at Ollama on your host machine (Mac/Windows Docker Desktop)
      OLLAMA_BASE: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
